    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #4f46e5;
            --accent-light: #eef2ff;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --radius: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER & HERO --- */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-color) 100%);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 32px;
        }

        /* --- SEARCH BAR --- */
        .search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-container svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            transition: var(--transition);
            outline: none;
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        /* --- MAIN CONTENT --- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        .category-section {
            margin-bottom: 48px;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .category-icon {
            font-size: 1.5rem;
            background: var(--accent-light);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .category-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* --- CARDS GRID --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .card:hover::before {
            transform: scaleY(1);
        }

        .card-icon {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* --- NO RESULTS --- */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            display: none;
        }

        .no-results.visible {
            display: block;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            header p { font-size: 1rem; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .card { padding: 14px 16px; font-size: 0.9rem; }
        }
    </style>
</head>

        // --- RENDER FUNCTION ---
        const content = document.getElementById('content');
        const noResults = document.getElementById('noResults');

        function renderData(filterText = "") {
            // Clear existing sections except noResults
            const existingSections = content.querySelectorAll('.category-section');
            existingSections.forEach(sec => sec.remove());

            let totalVisibleItems = 0;

            data.forEach((category, index) => {
                const filteredItems = category.items.filter(item => 
                    item.name.toLowerCase().includes(filterText.toLowerCase()) || 
                    category.title.toLowerCase().includes(filterText.toLowerCase())
                );

                if (filteredItems.length > 0) {
                    totalVisibleItems += filteredItems.length;

                    const section = document.createElement('section');
                    section.className = 'category-section';
                    section.style.animationDelay = `${index * 0.05}s`;

                    let cardsHTML = filteredItems.map(item => `
                        <a href="${item.url}" target="_blank" class="card" rel="noopener noreferrer">
                            <span class="card-icon">🔗</span>
                            <span>${item.name}</span>
                        </a>
                    `).join('');

                    section.innerHTML = `
                        <div class="category-header">
                            <div class="category-icon">${category.icon}</div>
                            <h2 class="category-title">${category.title}</h2>
                        </div>
                        <div class="cards-grid">
                            ${cardsHTML}
                        </div>
                    `;
                    
                    content.insertBefore(section, noResults);
                }
            });

            // Toggle No Results Message
            if (totalVisibleItems === 0) {
                noResults.classList.add('visible');
            } else {
                noResults.classList.remove('visible');
            }
        }

        // --- SEARCH EVENT LISTENER ---
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            renderData(e.target.value);
        });

        // Initial Render
